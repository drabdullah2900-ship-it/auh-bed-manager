<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUH Bed Manager</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#f4f7fb;
    font-family:Tahoma,sans-serif;
}

header{
    background:#0d6efd;
    color:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:15px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.count{
    color:green;
    font-weight:bold;
}

</style>
</head>

<body>

<header>
<h1>🏥 AUH Bed Manager</h1>
<p>University Hospital Aleppo</p>
</header>

<div class="grid" id="wardsContainer"></div>

<script type="module">

import wards from "./wards.js";

const container = document.getElementById("wardsContainer");

wards.forEach((ward) => {

    let totalBeds = 0;

    ward.rooms.forEach((room) => {
        totalBeds += room.beds;
    });

    container.innerHTML += 
        <div class="card">
            <h2>🏥 ${ward.name}</h2>
            <p>عدد الغرف: ${ward.rooms.length}</p>
            <p class="count">🛏️ ${totalBeds} سرير</p>
        </div>
    ;
});

</script>

</body>
</html>
