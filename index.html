<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUH Bed Manager</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#f4f7fb;
    font-family:Tahoma,sans-serif;
}

header{
   <div class="grid" id="wardsContainer"></div>

<script type="module">

import wards from "./wards.js";

const container = document.getElementById("wardsContainer");

wards.forEach(ward => {

    let totalBeds = 0;

    ward.rooms.forEach(room => {
        totalBeds += room.beds;
    });

    container.innerHTML += 
        <div class="card">
            <h2>🏥 ${ward.name}</h2>
            <p>عدد الغرف: ${ward.rooms.length}</p>
            <p class="count">🛏️ ${totalBeds} سرير</p>
        </div>
    ;

});

</script>

</body>
</html>
<header>
<h1>🏥 AUH Bed Manager</h1>
<p>University Hospital Aleppo</p>
</header>

<div class="grid">

<div class="grid" id="wardsContainer"></div>
