<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUH Bed Manager</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#f4f7fb;
    font-family:Tahoma,sans-serif;
}

header{
    background:#0d6efd;
    color:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:15px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.count{
    color:green;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>🏥 AUH Bed Manager</h1>
<p>University Hospital Aleppo</p>
</header>

<div class="grid">

<div class="card">
<h2>🫁 الصدرية والكلية</h2>
<p>الغرف: 401 - 418</p>
<p class="count">27 سرير</p>
</div>

<div class="card">
<h2>🧠 الهضمية والعصبية</h2>
<p>السابع</p>
<p class="count">24 سرير</p>
</div>

<div class="card">
<h2>❤️ العناية الداخلية</h2>
<p>8 أسرّة</p>
</div>

<div class="card">
<h2>❤️‍🩹 العناية القلبية</h2>
<p>غ2 - غ10</p>
</div>

</div>

</body>
</html>
